default_provider = "local_mock"

[providers.local_mock]
name = "local_mock"
base_url = ""
model = "local-model"
default_temperature = 0.0
default_max_tokens = 1024
timeout_seconds = 15.0
max_retries = 0
api_key_env = ""

[agents.planner]
name = "planner"
role = "planner"
provider = "local_mock"
model = "local-model"
description = "Plans and decomposes tasks"

[agents.repairer]
name = "repairer"
role = "repairer"
provider = "local_mock"
model = "local-model"
description = "Fixes code issues based on compiler diagnostics"

[agents.verifier]
name = "verifier"
role = "verifier"
provider = "local_mock"
model = "local-model"
description = "Verifies that repairs are correct"

[runtime]
command = [".zero/bin/elyon-runtime"]
request_timeout_seconds = 60.0
max_stdout_bytes = 1048576
max_stderr_bytes = 1048576

[repair]
max_attempts = 3
verify_after_repair = true
allowed_extensions = [".py", ".rs", ".zero", ".toml"]

[telemetry]
log_level = "INFO"
json_logs = true

[sandbox]
allowed_command_prefixes = ["cargo", "pytest", "ruff", "mypy", "opencode", "aider", "claude", "codex", "gemini"]
allowed_read_roots = ["."]
allowed_write_roots = ["."]

[state]
event_log_path = "./state/events.jsonl"

[compiler]
# Path to the zerolang compiler binary.
# Omit (or set to empty) to auto-detect from:
#   1. .zero/bin/zero (local build)
#   2. $PATH (global install)
# zerolang_path = ".zero/bin/zero"
